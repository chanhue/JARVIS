<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JARVIS</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-vignette"></div>

  <header class="top-bar">
    <div class="brand">
      <span class="brand-mark">J</span>
      <span class="brand-name">J.A.R.V.I.S.</span>
    </div>
    <div class="meta">
      <span id="user-chip" class="chip"></span>
      <span id="provider-chip" class="chip"></span>
      <button id="btn-settings" class="icon-btn" title="설정" aria-label="설정">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none"
             stroke="currentColor" stroke-width="1.5"
             stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
  </header>

  <main class="stage">
    <section class="reactor-wrap">
      <div class="reactor" id="reactor" data-state="standby">
        <div class="reactor-canvas" id="reactor-canvas" aria-hidden="true"></div>
        <div class="status-text" id="status-text">STANDBY</div>
        <div class="status-hint" id="status-hint">Say "Jarvis" to begin</div>
      </div>
    </section>

    <aside class="log-panel">
      <div class="panel-header">
        <span>TRANSCRIPT</span>
        <span class="dot" id="ws-dot" title="connection"></span>
      </div>
      <div id="log" class="log"></div>
    </aside>
  </main>

  <!-- 셋업 모달 -->
  <div id="setup-modal" class="modal hidden">
    <div class="modal-card">
      <div class="modal-header">
        <span class="brand-mark small">J</span>
        <span id="modal-title">INITIAL SETUP</span>
      </div>
      <div class="modal-body">
        <label class="field">
          <span>YOUR NAME</span>
          <input id="f-name" type="text" placeholder="Tony Stark" autocomplete="off" />
        </label>

        <label class="field">
          <span>AI ENGINE</span>
          <select id="f-provider">
            <option value="anthropic">Anthropic Claude</option>
            <option value="openai">OpenAI GPT</option>
            <option value="gemini">Google Gemini</option>
            <option value="ollama">Ollama (local)</option>
          </select>
        </label>

        <div id="row-key" class="field">
          <span id="f-key-label">API KEY</span>
          <input id="f-key" type="password" placeholder="sk-..." autocomplete="off" />
        </div>

        <label class="field">
          <span>MODEL</span>
          <input id="f-model" type="text" placeholder="claude-opus-4-7" />
        </label>

        <label id="row-ollama-host" class="field hidden">
          <span>OLLAMA HOST</span>
          <input id="f-ollama-host" type="text" value="http://localhost:11434" />
        </label>

        <div id="setup-error" class="error hidden"></div>
      </div>
      <div class="modal-footer">
        <button id="setup-cancel" class="ghost hidden">CANCEL</button>
        <button id="setup-submit" class="primary">INITIALIZE</button>
      </div>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
    }
  }
  </script>
  <script type="module" src="/static/app.js"></script>
</body>
</html>
